<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>marbles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:#07070c;}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;}
#splash{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:52px 48px;background:#07070c;transition:opacity .7s,visibility .7s;cursor:pointer;}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none;}
.logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:60px;letter-spacing:.05em;color:rgba(255,255,255,.88);}
.sub{font-family:'DM Mono',monospace;font-weight:300;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.2);text-align:center;line-height:2.3;}
.tap-hint{margin-top:16px;width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:300;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);border-color:rgba(255,255,255,.18);}50%{transform:scale(1.06);border-color:rgba(255,255,255,.36);}}
#strip{position:fixed;bottom:0;left:0;right:0;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 14px);background:linear-gradient(transparent,rgba(7,7,12,.94) 36%);display:flex;flex-direction:column;gap:7px;z-index:10;opacity:0;transition:opacity .6s;}
#strip.show{opacity:1;}
.chips{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.chip{padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.28);font-family:'DM Mono',monospace;font-weight:300;font-size:8.5px;letter-spacing:.12em;cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip.active{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.78);background:rgba(255,255,255,.06);}
.bottom-row{display:flex;align-items:center;justify-content:center;gap:14px;}
.ic{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.3);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.ic.on{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7);}
.mode-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:17px;letter-spacing:.1em;color:rgba(255,255,255,.22);min-width:70px;text-align:center;}
</style>
</head>
<body>
<div id="splash">
  <div class="logo">marbles</div>
  <div class="sub">shake · tilt · roll<br>to play</div>
  <div class="tap-hint">tap</div>
</div>
<canvas id="cv"></canvas>
<div id="strip">
  <div class="chips">
    <button class="chip active" data-mode="maracas">maracas</button>
    <button class="chip" data-mode="shaker">shaker</button>
    <button class="chip" data-mode="rain">rain stick</button>
    <button class="chip" data-mode="seeds">seeds</button>
    <button class="chip" data-mode="bells">bells</button>
  </div>
  <div class="bottom-row">
    <button class="ic on" id="ic-mute">♪</button>
    <div class="mode-name" id="mode-label">maracas</div>
    <button class="ic" id="ic-reset">↺</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  AUDIO — 3-layer maraca model, no setTimeout
//  Jerk → transient burst (bright, loud, instant)
//  Jerk decay → tail grains (scheduled via AudioContext time)
//  Velocity → rustle (soft continuous)
// ═══════════════════════════════════════════════════════
let AC = null, master = null, muted = false;
let noiseBuf = null;

const PENTA = [523.25,587.33,659.25,783.99,880.00,1046.5,1174.7,1318.5,1568.0,1760.0];
const bellCd = new Map();

const MODES_CFG = {
  maracas:{ fLo:3500, fHi:7500, q:1.4, isBell:false },
  shaker: { fLo:5000, fHi:10000,q:0.9, isBell:false },
  rain:   { fLo:600,  fHi:2200, q:0.5, isBell:false },
  seeds:  { fLo:2000, fHi:5000, q:2.2, isBell:false },
  bells:  { fLo:0,    fHi:0,    q:0,   isBell:true  },
};
let cfg = MODES_CFG.maracas;
let modeName = 'maracas';

// Motion state
const mot = { ax:0,ay:0,az:0, pax:0,pay:0,paz:0, jerk:0, vel:0 };
let grainCount = 0, motionOn = false;

// Per-layer cooldowns (ms)
let lastTransient = 0;
let lastRustle    = 0;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value=-18; comp.knee.value=12;
  comp.ratio.value=4; comp.attack.value=0.003; comp.release.value=0.15;
  master = AC.createGain(); master.gain.value = 2.2;
  master.connect(comp); comp.connect(AC.destination);
  const sb=AC.createBuffer(1,1,AC.sampleRate);
  const ss=AC.createBufferSource(); ss.buffer=sb;
  ss.connect(AC.destination); ss.start(0);
  if(AC.state==='suspended') AC.resume();
  buildNoise();
}

function buildNoise() {
  const sr=AC.sampleRate, len=sr*2;
  noiseBuf=AC.createBuffer(1,len,sr);
  const d=noiseBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0;
  for(let i=0;i<len;i++){
    const w=Math.random()*2-1;
    b0=.99886*b0+w*.0555; b1=.99332*b1+w*.0751;
    b2=.96900*b2+w*.1539; b3=.86650*b3+w*.3105;
    b4=.55000*b4+w*.5330;
    d[i]=(b0+b1+b2+b3+b4)*0.11;
  }
}

// Schedule a noise burst at AudioContext time `when`
function scheduleBurst(when, freq, Q, vol, dec) {
  if(!AC||!noiseBuf||muted||vol<0.005) return;
  grainCount++;
  const off=Math.random()*(noiseBuf.duration-0.05);
  const src=AC.createBufferSource();
  src.buffer=noiseBuf;
  src.loopStart=off; src.loopEnd=off+0.03+Math.random()*0.04;
  src.loop=true;
  src.playbackRate.value=0.7+Math.random()*0.6;
  const bp=AC.createBiquadFilter();
  bp.type='bandpass';
  bp.frequency.value=freq*(0.82+Math.random()*0.36);
  bp.Q.value=Q*(0.55+Math.random()*0.9);
  const env=AC.createGain();
  env.gain.setValueAtTime(vol,when);
  env.gain.exponentialRampToValueAtTime(0.0001,when+dec);
  src.connect(bp); bp.connect(env); env.connect(master);
  src.start(when); src.stop(when+dec+0.004);
}

// ── TRANSIENT: one big burst when jerk peaks ─────────
function fireTransient(jerkNorm) {
  const now=AC.currentTime;
  const m=cfg;
  const vol = 1.6 * jerkNorm;
  // Crack: instant, very short (4-8ms), loud
  scheduleBurst(now, m.fHi*(0.9+jerkNorm*0.2), m.q*0.6, vol*1.4, 0.004+jerkNorm*0.004);
  // Body: slightly longer body
  scheduleBurst(now, m.fLo*(1.1+jerkNorm*0.3), m.q*1.0, vol*0.9, 0.007+jerkNorm*0.008);
  // Sub-crack: tiny second hit 3ms later (seeds arriving slightly after)
  scheduleBurst(now+0.003, m.fHi*(0.7+jerkNorm*0.4), m.q*0.8, vol*0.5, 0.005+jerkNorm*0.003);
}

// ── TAIL: seeds scattering — scheduled ahead using AC time ──
// No setTimeout! All bursts pre-scheduled at exact future times.
function fireTail(jerkNorm) {
  const now=AC.currentTime;
  const m=cfg;
  const nBursts=3+Math.floor(jerkNorm*5); // 3-8 bursts
  for(let i=0;i<nBursts;i++){
    const t = now + 0.010 + i*(0.012+Math.random()*0.018);
    const fade = i/nBursts;                     // 0→1
    const vol  = 0.9*jerkNorm*(1-fade*0.75)*(0.4+Math.random()*0.6);
    const freq = m.fLo + Math.random()*(m.fHi-m.fLo)*(1-fade*0.3);
    const dec  = 0.012+Math.random()*0.020+fade*0.010;
    scheduleBurst(t, freq, m.q, vol, dec);
  }
}

// ── RUSTLE: soft continuous layer when moving ─────────
function maybeRustle(velNorm) {
  if(velNorm<0.06) return;
  const now=performance.now();
  const interval=Math.max(8, 38-velNorm*28);
  if(now-lastRustle<interval) return;
  lastRustle=now;
  const m=cfg;
  const vol=0.42*velNorm*(0.35+Math.random()*0.55);
  scheduleBurst(
    AC.currentTime,
    m.fLo*(0.8+Math.random()*1.2), m.q*0.7,
    vol, 0.016+Math.random()*0.024
  );
}

// ── Bell FM ───────────────────────────────────────────
function bellNote(noteIdx,vel) {
  if(!AC||muted) return;
  const now=performance.now();
  if(now-(bellCd.get(noteIdx)||0)<160) return;
  bellCd.set(noteIdx,now);
  if(vel<0.12) return;
  const t=AC.currentTime;
  const freq=PENTA[noteIdx%PENTA.length];
  const mod=AC.createOscillator(),modG=AC.createGain();
  const car=AC.createOscillator(),carE=AC.createGain();
  mod.frequency.value=freq*2.756; car.frequency.value=freq;
  modG.gain.setValueAtTime(freq*vel*2.5,t);
  modG.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  mod.connect(modG); modG.connect(car.frequency);
  const vol=0.32*(0.4+vel*0.6),dec=0.4+vel*0.6;
  carE.gain.setValueAtTime(vol,t);
  carE.gain.exponentialRampToValueAtTime(0.0001,t+dec);
  car.connect(carE); carE.connect(master);
  mod.start(t); car.start(t); mod.stop(t+dec+.05); car.stop(t+dec+.05);
}

// ── Motion processor ──────────────────────────────────
function processMotion(ax,ay,az) {
  // Jerk = delta acceleration (raw, unscaled)
  const djx=ax-mot.pax, djy=ay-mot.pay, djz=az-mot.paz;
  const jerk=Math.sqrt(djx*djx+djy*djy+djz*djz);
  mot.pax=ax; mot.pay=ay; mot.paz=az;
  mot.jerk=jerk;

  // Velocity = smoothed |acc| minus gravity
  const mag=Math.sqrt(ax*ax+ay*ay+az*az);
  const speed=Math.max(0,(mag-9.5)*0.10);
  mot.vel=mot.vel*0.78+speed*0.22;

  if(!AC||muted||cfg.isBell) return;

  // TRANSIENT threshold: raw jerk > 1.5 (was 0.28*normalised)
  // At jerk=2 → fires. At jerk=10 (hard shake) → loud.
  const now=performance.now();
  if(jerk>0.8 && now-lastTransient>55) {
    lastTransient=now;
    const strength=Math.min(1, jerk*0.12); // 0.8→0.10, 2→0.24, 10→1.0
    fireTransient(strength);
    fireTail(strength);
  }

  // RUSTLE always when moving
  maybeRustle(Math.min(1, mot.vel));
}

// ═══════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W=0,H=0,dpr=1;
let GX=0,GY=0.38;
const BALL_N=165, REST=0.52, FRIC=0.996, SUBSTEPS=3;
let balls=[];

const PALETTES={
  maracas:()=>({h:28+Math.random()*22,s:35,l:65+Math.random()*15}),
  shaker: ()=>({h:210+Math.random()*28,s:25,l:62+Math.random()*16}),
  rain:   ()=>({h:188+Math.random()*24,s:22,l:52+Math.random()*16}),
  seeds:  ()=>({h:82+Math.random()*28,s:24,l:55+Math.random()*14}),
  bells:  ()=>({h:46+Math.random()*30,s:48,l:74+Math.random()*14}),
};
let palFn=PALETTES.maracas;

function mkBall(i){
  const r=2+Math.random()*2.5, p=palFn();
  return{id:i,x:r+Math.random()*(W-r*2),y:r+Math.random()*(H*0.6),
    vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,r,
    fill:`hsl(${p.h},${p.s}%,${p.l}%)`,a:0.68+Math.random()*0.32,
    noteIdx:Math.floor(Math.random()*PENTA.length)};
}
function initBalls(){balls=[];for(let i=0;i<BALL_N;i++)balls.push(mkBall(i));}
function recolor(){balls.forEach(b=>{const p=palFn();b.fill=`hsl(${p.h},${p.s}%,${p.l}%)`});}

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initBalls();
}
window.addEventListener('resize',()=>{ctx.setTransform(1,0,0,1,0,0);resize();});

const wallBellCd=new Map();
function wallBell(bid,noteIdx,speed){
  if(modeName!=='bells') return;
  const now=performance.now();
  if(now-(wallBellCd.get(bid)||0)<200) return;
  wallBellCd.set(bid,now);
  bellNote(noteIdx,Math.min(1,speed*0.12));
}

function physicsStep(){
  for(let s=0;s<SUBSTEPS;s++){
    for(const b of balls){b.vx=(b.vx+GX)*FRIC;b.vy=(b.vy+GY)*FRIC;b.x+=b.vx;b.y+=b.vy;}
    for(const b of balls){
      if(b.x-b.r<0){b.x=b.r;const sp=Math.abs(b.vx);b.vx=sp*REST;wallBell(b.id,b.noteIdx,sp);}
      else if(b.x+b.r>W){b.x=W-b.r;const sp=Math.abs(b.vx);b.vx=-sp*REST;wallBell(b.id,b.noteIdx,sp);}
      if(b.y-b.r<0){b.y=b.r;const sp=Math.abs(b.vy);b.vy=sp*REST;wallBell(b.id,b.noteIdx,sp);}
      else if(b.y+b.r>H){b.y=H-b.r;const sp=Math.abs(b.vy);b.vy=-sp*REST;wallBell(b.id,b.noteIdx,sp);}
    }
    for(let i=0;i<balls.length;i++){
      for(let j=i+1;j<balls.length;j++){
        const a=balls[i],b=balls[j];
        const dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy,md=a.r+b.r;
        if(d2>=md*md||d2<.001) continue;
        const dist=Math.sqrt(d2),nx=dx/dist,ny=dy/dist,ov=(md-dist)*.5;
        a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        const dvx=b.vx-a.vx,dvy=b.vy-a.vy,dot=dvx*nx+dvy*ny;
        if(dot<0){const imp=dot*(1+REST)*.5;a.vx+=imp*nx;a.vy+=imp*ny;b.vx-=imp*nx;b.vy-=imp*ny;}
      }
    }
  }
}

function draw(){
  ctx.fillStyle='#07070c';ctx.fillRect(0,0,W,H);
  for(const b of balls){
    ctx.globalAlpha=b.a;ctx.fillStyle=b.fill;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop(){requestAnimationFrame(loop);physicsStep();draw();}

// ═══════════════════════════════════════════════════════
//  MOTION
// ═══════════════════════════════════════════════════════
function onMotion(e){
  const a=e.accelerationIncludingGravity||{};
  const ax=a.x||0,ay=a.y||0,az=a.z||0;
  processMotion(ax,ay,az);
  GX=Math.max(-.9,Math.min(.9,ax*.062));
  GY=Math.max(-.9,Math.min(.9,-ay*.062));
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
const dbg=document.createElement('div');
dbg.style.cssText='position:fixed;top:10px;left:10px;z-index:99;font:11px monospace;color:lime;pointer-events:none;line-height:1.7;text-shadow:0 0 4px #000';
document.body.appendChild(dbg);
setInterval(()=>{
  dbg.innerHTML=
    'AC: '+(AC?AC.state:'null')+'<br>'+
    'jerk: '+mot.jerk.toFixed(1)+'<br>'+
    'vel: '+mot.vel.toFixed(3)+'<br>'+
    'grains: '+grainCount+'<br>'+
    'motion: '+(motionOn?'YES':'NO');
},200);

document.getElementById('splash').addEventListener('click',async()=>{
  initAudio();
  try{
    if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
      const r=await DeviceMotionEvent.requestPermission();
      if(r!=='granted') throw new Error('denied');
    }
    window.addEventListener('devicemotion',onMotion,{passive:true});
    motionOn=true;
  }catch(e){console.warn('Motion:',e.message);}
  document.getElementById('splash').classList.add('gone');
  document.getElementById('strip').classList.add('show');
});

document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    const m=btn.dataset.mode;
    modeName=m;cfg=MODES_CFG[m]||MODES_CFG.maracas;
    palFn=PALETTES[m]||PALETTES.maracas;
    document.getElementById('mode-label').textContent=btn.textContent;
    recolor();
  });
});

document.getElementById('ic-mute').addEventListener('click',()=>{
  muted=!muted;
  if(master) master.gain.value=muted?0:1.8;
  document.getElementById('ic-mute').textContent=muted?'✕':'♪';
  document.getElementById('ic-mute').classList.toggle('on',!muted);
});

document.getElementById('ic-reset').addEventListener('click',()=>initBalls());

resize();
loop();
</script>

</body>
</html>
