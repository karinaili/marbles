<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>marbles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#07070c;touch-action:none;}
canvas{position:fixed;inset:0;display:block;width:100%;height:100%;}

#splash{
position:fixed;inset:0;z-index:99;
background:#07070c;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
transition:opacity .6s;
}
#splash.gone{opacity:0;pointer-events:none;}
.logo{font-family:‘Cormorant Garamond’,serif;font-style:italic;font-weight:300;font-size:58px;letter-spacing:.05em;color:rgba(255,255,255,.9);}
.sub{font-family:‘DM Mono’,monospace;font-weight:300;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.22);text-align:center;line-height:2.2;}
.tap-hint{
margin-top:16px;width:72px;height:72px;border-radius:50%;
border:1px solid rgba(255,255,255,.18);
display:flex;align-items:center;justify-content:center;
font-family:‘DM Mono’,monospace;font-weight:300;
font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;
color:rgba(255,255,255,.3);cursor:pointer;
animation:pulse 2.2s ease-in-out infinite;
touch-action:auto;-webkit-tap-highlight-color:rgba(255,255,255,.1);
}
@keyframes pulse{
0%,100%{transform:scale(1);border-color:rgba(255,255,255,.18);}
50%{transform:scale(1.06);border-color:rgba(255,255,255,.38);}
}

#strip{
position:fixed;bottom:0;left:0;right:0;
padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 14px);
background:linear-gradient(transparent,rgba(7,7,12,.95) 35%);
display:flex;flex-direction:column;gap:7px;z-index:10;
opacity:0;pointer-events:none;transition:opacity .5s;
}
#strip.show{opacity:1;pointer-events:auto;}
.chips{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.chip{
padding:4px 12px;border-radius:20px;
border:1px solid rgba(255,255,255,.1);background:transparent;
color:rgba(255,255,255,.28);font-family:‘DM Mono’,monospace;font-weight:300;
font-size:8.5px;letter-spacing:.12em;cursor:pointer;white-space:nowrap;
touch-action:auto;-webkit-tap-highlight-color:rgba(255,255,255,.08);
}
.chip.active{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.8);background:rgba(255,255,255,.06);}
.brow{display:flex;align-items:center;justify-content:center;gap:14px;}
.ic{
width:30px;height:30px;border-radius:50%;
border:1px solid rgba(255,255,255,.15);background:transparent;
color:rgba(255,255,255,.35);font-size:12px;
display:flex;align-items:center;justify-content:center;cursor:pointer;
touch-action:auto;-webkit-tap-highlight-color:rgba(255,255,255,.08);
}
.ic.on{border-color:rgba(255,255,255,.45);color:rgba(255,255,255,.75);}
.mname{font-family:‘Cormorant Garamond’,serif;font-style:italic;font-weight:300;font-size:17px;letter-spacing:.1em;color:rgba(255,255,255,.22);min-width:70px;text-align:center;}
</style>

</head>
<body>

<div id="splash">
  <div class="logo">marbles</div>
  <div class="sub">shake · tilt · roll<br>to play</div>
  <div id="btn-start" class="tap-hint">tap</div>
</div>

<canvas id="cv"></canvas>

<div id="strip">
  <div class="chips">
    <button class="chip active" data-mode="maracas">maracas</button>
    <button class="chip" data-mode="shaker">shaker</button>
    <button class="chip" data-mode="rain">rain stick</button>
    <button class="chip" data-mode="seeds">seeds</button>
    <button class="chip" data-mode="bells">bells</button>
  </div>
  <div class="brow">
    <button class="ic on" id="ic-mute">♪</button>
    <div class="mname" id="mname">maracas</div>
    <button class="ic" id="ic-reset">↺</button>
  </div>
</div>

<script>
'use strict';

// ── AUDIO ──────────────────────────────────────────────────
var AC, master, muted=false, noiseBuf;

var MODES = {
  maracas:{ fLo:1800, fHi:5000, qLo:1.0, qHi:2.8, vol:0.95, dec:0.010 },
  shaker: { fLo:5000, fHi:10000,qLo:1.5,qHi:4,  vol:0.45, dec:0.008 },
  rain:   { fLo:600,  fHi:2500, qLo:0.8,qHi:2.5,vol:0.50, dec:0.030 },
  seeds:  { fLo:2000, fHi:5500, qLo:2.5,qHi:6,  vol:0.52, dec:0.014 },
  bells:  { fLo:0,    fHi:0,    qLo:0,  qHi:0,  vol:0.30, dec:0     },
};
var snd = MODES.maracas;
var modeName = 'maracas';

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  var comp = AC.createDynamicsCompressor();
  comp.threshold.value=-18; comp.knee.value=10;
  comp.ratio.value=5; comp.attack.value=0.001; comp.release.value=0.10;
  master = AC.createGain();
  master.gain.value = 2.8;
  master.connect(comp); comp.connect(AC.destination);
  // iOS unlock
  var sb=AC.createBuffer(1,1,AC.sampleRate);
  var ss=AC.createBufferSource(); ss.buffer=sb;
  ss.connect(AC.destination); ss.start(0);
  if(AC.state==='suspended') AC.resume();
  buildNoise();
}

function buildNoise() {
  var sr=AC.sampleRate, len=sr*2;
  noiseBuf=AC.createBuffer(1,len,sr);
  var d=noiseBuf.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
}

function oneClick(speed, loud) {
  if(!AC||!noiseBuf||muted||snd.fLo===0) return;
  var now=AC.currentTime;
  var v=Math.min(1,speed*0.045);
  if(v<0.04) return;
  var vol=snd.vol*v*(loud?1.0:0.55)*(0.55+Math.random()*0.45);
  var freq=snd.fLo+Math.random()*(snd.fHi-snd.fLo)*(0.7+v*0.3);
  var Q=snd.qLo+Math.random()*(snd.qHi-snd.qLo);
  var dec=snd.dec*(0.5+v*0.7)*(0.7+Math.random()*0.6);
  var off=Math.random()*(noiseBuf.duration-0.05);
  var src=AC.createBufferSource();
  src.buffer=noiseBuf; src.loopStart=off; src.loopEnd=off+0.01+Math.random()*0.01; src.loop=true;
  src.playbackRate.value=0.8+Math.random()*0.5;
  var bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=freq; bp.Q.value=Q;
  var env=AC.createGain();
  env.gain.setValueAtTime(vol,now); env.gain.exponentialRampToValueAtTime(0.0001,now+dec);
  src.connect(bp); bp.connect(env); env.connect(master);
  src.start(now); src.stop(now+dec+0.003);
}

function accent(strength) {
  if(!AC||!noiseBuf||muted||snd.fLo===0) return;
  var now=AC.currentTime;
  var off=Math.random()*(noiseBuf.duration-0.05);
  var src=AC.createBufferSource();
  src.buffer=noiseBuf; src.loopStart=off; src.loopEnd=off+0.008; src.loop=true;
  src.playbackRate.value=1.2+Math.random()*0.3;
  var bp=AC.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=snd.fHi*(0.85+Math.random()*0.15); bp.Q.value=snd.qHi;
  var env=AC.createGain(); var dec=snd.dec*0.4;
  env.gain.setValueAtTime(snd.vol*1.4*strength,now);
  env.gain.exponentialRampToValueAtTime(0.0001,now+dec);
  src.connect(bp); bp.connect(env); env.connect(master);
  src.start(now); src.stop(now+dec+0.002);
}

function burst(strength) {
  if(!AC||muted||snd.fLo===0) return;
  accent(strength);
  var now=AC.currentTime;
  var n=Math.round(18+Math.log1p(strength*8)/Math.log1p(8)*60);
  var dur=0.025+strength*0.040;
  for(var i=0;i<n;i++){
    var r=Math.random(); var t=r*r*dur; var when=now+t;
    var freq=snd.fLo+Math.random()*(snd.fHi-snd.fLo);
    var Q=snd.qLo+Math.random()*(snd.qHi-snd.qLo);
    var vol=snd.vol*strength*(0.4+Math.random()*0.6)*(1-t/dur*0.5);
    var dec=snd.dec*(0.5+Math.random()*0.6);
    if(vol<0.02) continue;
    var off=Math.random()*(noiseBuf.duration-0.05);
    var src=AC.createBufferSource();
    src.buffer=noiseBuf; src.loopStart=off; src.loopEnd=off+0.01+Math.random()*0.01; src.loop=true;
    src.playbackRate.value=0.8+Math.random()*0.5;
    var bp=AC.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value=freq*(0.85+Math.random()*0.3); bp.Q.value=Q*(0.6+Math.random()*0.8);
    var env=AC.createGain();
    env.gain.setValueAtTime(vol,when); env.gain.exponentialRampToValueAtTime(0.0001,when+dec);
    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(when); src.stop(when+dec+0.003);
  }
}

var lastMicroT=0;
function micro(strength) {
  if(!AC||muted||snd.fLo===0||strength<0.04) return;
  var now=performance.now();
  var iv=Math.max(22,90-strength*68)*(0.7+Math.random()*0.6);
  if(now-lastMicroT<iv) return;
  lastMicroT=now;
  oneClick(3+Math.random()*4, false);
}

var PENTA=[523.25,587.33,659.25,783.99,880.00,1046.5,1174.7,1318.5,1568.0,1760.0];
var bellCd={};
function bellClick(idx,sp){
  if(!AC||muted) return;
  var now=performance.now();
  if(now-(bellCd[idx]||0)<140) return;
  bellCd[idx]=now;
  var vel=Math.min(1,sp*0.06); if(vel<0.1) return;
  var t=AC.currentTime, freq=PENTA[idx%PENTA.length];
  var mod=AC.createOscillator(),modG=AC.createGain();
  var car=AC.createOscillator(),carE=AC.createGain();
  mod.frequency.value=freq*2.756; car.frequency.value=freq;
  modG.gain.setValueAtTime(freq*vel*2.2,t); modG.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  mod.connect(modG); modG.connect(car.frequency);
  var vol=0.28*(0.4+vel*0.6), dec=0.30+vel*0.45;
  carE.gain.setValueAtTime(vol,t); carE.gain.exponentialRampToValueAtTime(0.0001,t+dec);
  car.connect(carE); carE.connect(master);
  mod.start(t); car.start(t); mod.stop(t+dec+.04); car.stop(t+dec+.04);
}

// ── PHYSICS ────────────────────────────────────────────────
var cv=document.getElementById('cv');
var ctx=cv.getContext('2d');
var W=0,H=0,dpr=1,GX=0,GY=0.38;
var BALL_N=495, REST=0.50, FRIC=0.995, SUB=3;
var balls=[];

var PALETTES={
  maracas:function(){return{h:28+Math.random()*22,s:35,l:65+Math.random()*15};},
  shaker:function(){return{h:210+Math.random()*28,s:25,l:62+Math.random()*16};},
  rain:function(){return{h:188+Math.random()*24,s:22,l:52+Math.random()*16};},
  seeds:function(){return{h:82+Math.random()*28,s:24,l:55+Math.random()*14};},
  bells:function(){return{h:46+Math.random()*30,s:48,l:74+Math.random()*14};}
};
var palFn=PALETTES.maracas;

function mkBall(i){
  var r=1.2+Math.random()*1.6; var p=palFn();
  return{id:i,x:r+Math.random()*(W-r*2),y:r+Math.random()*(H*0.6),
    vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,r:r,
    fill:'hsl('+p.h+','+p.s+'%,'+p.l+'%)',a:0.68+Math.random()*0.32,
    ni:Math.floor(Math.random()*PENTA.length)};
}
function initBalls(){balls=[];for(var i=0;i<BALL_N;i++)balls.push(mkBall(i));}
function recolor(){balls.forEach(function(b){var p=palFn();b.fill='hsl('+p.h+','+p.s+'%,'+p.l+'%)';});}

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initBalls();
}
window.addEventListener('resize',function(){ctx.setTransform(1,0,0,1,0,0);resize();});

function physicsStep(){
  for(var s=0;s<SUB;s++){
    for(var i=0;i<balls.length;i++){
      var b=balls[i];
      b.vx=(b.vx+GX)*FRIC; b.vy=(b.vy+GY)*FRIC;
      b.x+=b.vx; b.y+=b.vy;
    }
    for(var i=0;i<balls.length;i++){
      var b=balls[i];
      if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*REST;}
      else if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx)*REST;}
      if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*REST;}
      else if(b.y+b.r>H){b.y=H-b.r;b.vy=-Math.abs(b.vy)*REST;}
    }
    for(var i=0;i<balls.length;i++){
      for(var j=i+1;j<balls.length;j++){
        var a=balls[i],b=balls[j];
        var dx=b.x-a.x,dy=b.y-a.y,d2=dx*dx+dy*dy,md=a.r+b.r;
        if(d2>=md*md||d2<.001) continue;
        var dist=Math.sqrt(d2),nx=dx/dist,ny=dy/dist,ov=(md-dist)*.5;
        a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        var dvx=b.vx-a.vx,dvy=b.vy-a.vy,dot=dvx*nx+dvy*ny;
        if(dot<0){var imp=dot*(1+REST)*.5;a.vx+=imp*nx;a.vy+=imp*ny;b.vx-=imp*nx;b.vy-=imp*ny;}
      }
    }
  }
}

function draw(){
  ctx.fillStyle='#07070c';ctx.fillRect(0,0,W,H);
  for(var i=0;i<balls.length;i++){
    var b=balls[i];
    ctx.globalAlpha=b.a;ctx.fillStyle=b.fill;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop(){requestAnimationFrame(loop);physicsStep();draw();}

// ── MOTION ─────────────────────────────────────────────────
var pax=0,pay=0,paz=0;
var jSmooth=0,jPrev=0;
var lastBurst=0, microStr=0;
var BURST_THR=0.08, BURST_CD=48, BURST_SIL=55;

function onMotion(e){
  var a=e.accelerationIncludingGravity||{};
  var ax=a.x||0,ay=a.y||0,az=a.z||0;
  var dx=ax-pax,dy=ay-pay,dz=az-paz;
  pax=ax;pay=ay;paz=az;
  var jRaw=Math.sqrt(dx*dx+dy*dy+dz*dz);
  var al=jRaw>jSmooth?0.45:0.08;
  jPrev=jSmooth; jSmooth=jSmooth*(1-al)+jRaw*al;
  GX=Math.max(-.8,Math.min(.8, ax*0.056));
  GY=Math.max(-.8,Math.min(.8,-ay*0.056));
  if(jRaw>1.5){
    var sc=Math.min(3.2,jRaw*0.20);
    var nx=dx/jRaw,ny=dy/jRaw;
    for(var i=0;i<balls.length;i++){
      balls[i].vx+=(-nx)*sc*(0.8+Math.random()*0.4);
      balls[i].vy+=( ny)*sc*(0.8+Math.random()*0.4);
    }
  }
  var now=performance.now();
  var str=Math.min(1,jSmooth*0.09);
  var peak=(jSmooth>BURST_THR&&jSmooth>=jPrev)||jRaw>2.8;
  if(peak&&now-lastBurst>BURST_CD){
    lastBurst=now;
    var s=(jRaw>2.8&&!(jSmooth>BURST_THR&&jSmooth>=jPrev))?Math.min(1,jRaw*0.06):str;
    if(modeName==='bells') bellClick(Math.floor(Math.random()*PENTA.length),jRaw);
    else burst(s);
  }
  microStr=microStr*0.85+str*0.15;
  if(now-lastBurst>BURST_SIL&&microStr>0.04&&modeName!=='bells') micro(microStr);
}

// ── UI ─────────────────────────────────────────────────────
function startApp(){
  initAudio();
  var promise;
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    promise=DeviceMotionEvent.requestPermission();
  } else {
    promise=Promise.resolve('granted');
  }
  promise.then(function(r){
    if(r==='granted') window.addEventListener('devicemotion',onMotion,{passive:true});
  }).catch(function(e){console.warn(e);});
  document.getElementById('splash').classList.add('gone');
  document.getElementById('strip').classList.add('show');
}

document.getElementById('btn-start').addEventListener('click',startApp);

document.querySelectorAll('.chip').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});
    btn.classList.add('active');
    var m=btn.dataset.mode;
    modeName=m; snd=MODES[m]||MODES.maracas;
    palFn=PALETTES[m]||PALETTES.maracas;
    document.getElementById('mname').textContent=btn.textContent;
    recolor();
  });
});

document.getElementById('ic-mute').addEventListener('click',function(){
  muted=!muted;
  if(master) master.gain.value=muted?0:2.8;
  this.textContent=muted?'✕':'♪';
  this.classList.toggle('on',!muted);
});

document.getElementById('ic-reset').addEventListener('click',function(){initBalls();});

resize();
loop();
</script>

</body>
</html>
