<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>marbles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:#07070c;}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;}
#splash{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:52px 48px;background:#07070c;transition:opacity .7s,visibility .7s;cursor:pointer;}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none;}
.logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:60px;letter-spacing:.05em;color:rgba(255,255,255,.88);}
.sub{font-family:'DM Mono',monospace;font-weight:300;font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:rgba(255,255,255,.2);text-align:center;line-height:2.3;}
.tap-hint{margin-top:16px;width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-weight:300;font-size:8.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);border-color:rgba(255,255,255,.18);}50%{transform:scale(1.06);border-color:rgba(255,255,255,.36);}}
#strip{position:fixed;bottom:0;left:0;right:0;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 14px);background:linear-gradient(transparent,rgba(7,7,12,.94) 36%);display:flex;flex-direction:column;gap:7px;z-index:10;opacity:0;transition:opacity .6s;}
#strip.show{opacity:1;}
.chips{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.chip{padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.28);font-family:'DM Mono',monospace;font-weight:300;font-size:8.5px;letter-spacing:.12em;cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip.active{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.78);background:rgba(255,255,255,.06);}
.bottom-row{display:flex;align-items:center;justify-content:center;gap:14px;}
.ic{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.3);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.ic.on{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7);}
.mode-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:17px;letter-spacing:.1em;color:rgba(255,255,255,.22);min-width:70px;text-align:center;}
</style>
</head>
<body>
<div id="splash">
  <div class="logo">marbles</div>
  <div class="sub">shake · tilt · roll<br>to play</div>
  <div class="tap-hint">tap</div>
</div>
<canvas id="cv"></canvas>
<div id="strip">
  <div class="chips">
    <button class="chip active" data-mode="maracas">maracas</button>
    <button class="chip" data-mode="shaker">shaker</button>
    <button class="chip" data-mode="rain">rain stick</button>
    <button class="chip" data-mode="seeds">seeds</button>
    <button class="chip" data-mode="bells">bells</button>
  </div>
  <div class="bottom-row">
    <button class="ic on" id="ic-mute">♪</button>
    <div class="mode-name" id="mode-label">maracas</div>
    <button class="ic" id="ic-reset">↺</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let AC = null, master = null, muted = false;
let noiseBuf = null;

// Pentatonic scale freqs (C5 pentatonic + octave above) for bells mode
const PENTA = [523.25, 587.33, 659.25, 783.99, 880.00,
               1046.5, 1174.7, 1318.5, 1568.0, 1760.0];

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();

  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18; comp.knee.value = 14;
  comp.ratio.value = 3.5;    comp.attack.value = 0.005;
  comp.release.value = 0.2;

  master = AC.createGain();
  master.gain.value = 0.65;
  master.connect(comp);
  comp.connect(AC.destination);

  // iOS speaker unlock
  const sb = AC.createBuffer(1, 1, AC.sampleRate);
  const ss = AC.createBufferSource();
  ss.buffer = sb; ss.connect(AC.destination); ss.start(0);
  if (AC.state === 'suspended') AC.resume();

  // Pink-ish noise buffer (60ms)
  const sr = AC.sampleRate;
  noiseBuf = AC.createBuffer(1, Math.floor(sr * 0.06), sr);
  const d = noiseBuf.getChannelData(0);
  let b0=0,b1=0,b2=0;
  for (let i = 0; i < d.length; i++) {
    const w = Math.random()*2-1;
    b0=.99886*b0+w*.0555; b1=.96900*b1+w*.1538; b2=.57000*b2+w*.5330;
    d[i]=(b0+b1+b2+w*.18)*.13;
  }
}

// ── Noise click (maracas / shaker / rain / seeds) ───
// vol, freq, Q, dur all tiny
const NOISE_MODES = {
  maracas: { vol:0.20, freq:4200, q:1.6, dur:0.009 },
  shaker:  { vol:0.17, freq:6800, q:1.1, dur:0.006 },
  rain:    { vol:0.18, freq:1200, q:0.55,dur:0.022 },
  seeds:   { vol:0.19, freq:2600, q:2.8, dur:0.011 },
};

function noiseClick(p, vel) {
  if (!AC || !noiseBuf || muted) return;
  const now = AC.currentTime;
  const off = Math.random() * 0.04;
  const src = AC.createBufferSource();
  src.buffer = noiseBuf;
  src.loopStart = off; src.loopEnd = off + 0.007 + Math.random()*.003;
  src.loop = true;
  src.playbackRate.value = 0.82 + Math.random()*0.36;

  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = p.freq * (0.8 + vel*0.4) * (0.94 + Math.random()*.12);
  bp.Q.value = p.q * (0.7 + Math.random()*.5);

  const env = AC.createGain();
  const vol = p.vol * (0.25 + vel*0.75);
  const dur = p.dur * (0.6 + vel*0.7);
  env.gain.setValueAtTime(vol, now);
  env.gain.exponentialRampToValueAtTime(0.0001, now + dur);

  src.connect(bp); bp.connect(env); env.connect(master);
  src.start(now); src.stop(now + dur + 0.001);
}

// ── Bell / chime (melodic mode) ─────────────────────
// FM synthesis: carrier sine + modulator → warm bell tone
// Each ball gets its own note from pentatonic scale
function bellRing(noteIdx, vel, isWall) {
  if (!AC || muted) return;
  const now  = AC.currentTime;
  const freq = PENTA[noteIdx % PENTA.length];

  // Modulator → carrier (FM)
  const mod  = AC.createOscillator();
  const modG = AC.createGain();
  const car  = AC.createOscillator();
  const carE = AC.createGain();

  mod.type = 'sine';
  mod.frequency.value = freq * 2.756; // inharmonic ratio → bell colour

  car.type = 'sine';
  car.frequency.value = freq;

  // FM depth: more vel = more brightness (more FM)
  const fmDepth = freq * (0.5 + vel * 2.5);
  modG.gain.setValueAtTime(fmDepth, now);
  modG.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

  mod.connect(modG); modG.connect(car.frequency);

  // Volume envelope: instant attack, long decay (bell lingering)
  const vol = (isWall ? 0.18 : 0.10) * (0.3 + vel * 0.7);
  const dec = isWall ? (0.4 + vel * 0.5) : (0.2 + vel * 0.3);
  carE.gain.setValueAtTime(vol, now);
  carE.gain.exponentialRampToValueAtTime(0.0001, now + dec);

  car.connect(carE); carE.connect(master);
  mod.start(now); car.start(now);
  mod.stop(now + dec + 0.05); car.stop(now + dec + 0.05);
}

// ── Mode state ──────────────────────────────────────
let modeName = 'maracas';

// ── Cooldowns ───────────────────────────────────────
const wallCd = new Map();
const ballCd = new Map();
const WALL_CD_MS = 55;
const BALL_CD_MS = 70; // slightly longer for ball-ball

function wallHit(bid, side, speed) {
  if (muted || !AC) return;
  const key = bid * 4 + side;
  const now = performance.now();
  if (now - (wallCd.get(key)||0) < WALL_CD_MS) return;
  wallCd.set(key, now);
  const vel = Math.min(1, speed * 0.09);
  if (vel < 0.06) return;

  if (modeName === 'bells') {
    bellRing(bid, vel, true);
  } else {
    noiseClick(NOISE_MODES[modeName] || NOISE_MODES.maracas, vel);
  }
}

function ballHit(aid, bid, speed) {
  if (muted || !AC) return;
  const key = Math.min(aid,bid) * 10000 + Math.max(aid,bid);
  const now = performance.now();
  if (now - (ballCd.get(key)||0) < BALL_CD_MS) return;
  ballCd.set(key, now);
  const vel = Math.min(1, speed * 0.07);
  if (vel < 0.07) return;

  if (modeName === 'bells') {
    // Ball-ball: play the softer note (average of two ball indices)
    bellRing(Math.floor((aid + bid) / 2), vel * 0.7, false);
  } else {
    // Ball-ball: same sound but quieter
    const p = { ...( NOISE_MODES[modeName] || NOISE_MODES.maracas ) };
    p.vol *= 0.55; // noticeably quieter than wall hits
    p.dur *= 0.75;
    noiseClick(p, vel);
  }
}

// ═══════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W=0, H=0, dpr=1;
let GX=0, GY=0.35;

const BALL_N   = 90;   // more balls, smaller
const REST     = 0.50;
const FRIC     = 0.992;
const SUBSTEPS = 3;

let balls = [];

const PALETTES = {
  maracas:()=>({h:28 +Math.random()*22,s:33,l:64+Math.random()*16}),
  shaker: ()=>({h:210+Math.random()*28,s:23,l:60+Math.random()*18}),
  rain:   ()=>({h:188+Math.random()*24,s:20,l:50+Math.random()*18}),
  seeds:  ()=>({h:82 +Math.random()*28,s:22,l:52+Math.random()*16}),
  bells:  ()=>({h:46 +Math.random()*30,s:45,l:72+Math.random()*16}),
};
let palFn = PALETTES.maracas;

function mkBall(i) {
  const r = 2 + Math.random() * 3.5;  // smaller: 2–5.5px
  const p = palFn();
  return {
    id:i,
    x: r + Math.random()*(W - r*2),
    y: r + Math.random()*(H * 0.6),
    vx:(Math.random()-.5)*3,
    vy:(Math.random()-.5)*3,
    r,
    noteIdx: Math.floor(Math.random() * PENTA.length), // fixed note per ball
    fill:`hsl(${p.h},${p.s}%,${p.l}%)`,
    a: 0.70 + Math.random()*0.30,
  };
}

function initBalls() {
  balls=[];
  for (let i=0; i<BALL_N; i++) balls.push(mkBall(i));
}
function recolor() {
  balls.forEach(b=>{ const p=palFn(); b.fill=`hsl(${p.h},${p.s}%,${p.l}%)`; });
}

function resize() {
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initBalls();
}
window.addEventListener('resize',()=>{ ctx.setTransform(1,0,0,1,0,0); resize(); });

function physicsStep() {
  for (let s=0; s<SUBSTEPS; s++) {
    for (const b of balls) {
      b.vx=(b.vx+GX)*FRIC; b.vy=(b.vy+GY)*FRIC;
      b.x+=b.vx; b.y+=b.vy;
    }

    for (const b of balls) {
      if (b.x-b.r<0)    { const sp=Math.abs(b.vx); b.x=b.r;   b.vx= sp*REST; wallHit(b.id,0,sp); }
      else if(b.x+b.r>W){ const sp=Math.abs(b.vx); b.x=W-b.r; b.vx=-sp*REST; wallHit(b.id,1,sp); }
      if (b.y-b.r<0)    { const sp=Math.abs(b.vy); b.y=b.r;   b.vy= sp*REST; wallHit(b.id,2,sp); }
      else if(b.y+b.r>H){ const sp=Math.abs(b.vy); b.y=H-b.r; b.vy=-sp*REST; wallHit(b.id,3,sp); }
    }

    for (let i=0; i<balls.length; i++) {
      for (let j=i+1; j<balls.length; j++) {
        const a=balls[i], b=balls[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const d2=dx*dx+dy*dy, md=a.r+b.r;
        if (d2>=md*md||d2<.001) continue;
        const dist=Math.sqrt(d2), nx=dx/dist, ny=dy/dist;
        const ov=(md-dist)*.5;
        a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
        const dvx=b.vx-a.vx, dvy=b.vy-a.vy, dot=dvx*nx+dvy*ny;
        if (dot<0) {
          const imp=dot*(1+REST)*.5;
          const speed=Math.abs(dot);
          a.vx+=imp*nx; a.vy+=imp*ny;
          b.vx-=imp*nx; b.vy-=imp*ny;
          ballHit(a.id, b.id, speed);
        }
      }
    }
  }
}

function draw() {
  ctx.fillStyle='#07070c';
  ctx.fillRect(0,0,W,H);
  for (const b of balls) {
    ctx.globalAlpha=b.a;
    ctx.fillStyle=b.fill;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop() {
  requestAnimationFrame(loop);
  physicsStep();
  draw();
}

// ═══════════════════════════════════════════════════════
//  MOTION
// ═══════════════════════════════════════════════════════
function onMotion(e) {
  const a=e.accelerationIncludingGravity||{};
  GX=Math.max(-.8,Math.min(.8, (a.x||0)*.058));
  GY=Math.max(-.8,Math.min(.8,-(a.y||0)*.058));
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
document.getElementById('splash').addEventListener('click', async () => {
  initAudio();
  try {
    if (typeof DeviceMotionEvent!=='undefined' &&
        typeof DeviceMotionEvent.requestPermission==='function') {
      const r=await DeviceMotionEvent.requestPermission();
      if (r!=='granted') throw new Error('denied');
    }
    window.addEventListener('devicemotion',onMotion,{passive:true});
  } catch(e){ console.warn('Motion:',e.message); }
  document.getElementById('splash').classList.add('gone');
  document.getElementById('strip').classList.add('show');
});

document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    const m=btn.dataset.mode;
    modeName=m;
    palFn=PALETTES[m]||PALETTES.maracas;
    document.getElementById('mode-label').textContent=btn.textContent;
    recolor();
  });
});

document.getElementById('ic-mute').addEventListener('click',()=>{
  muted=!muted;
  if (master) master.gain.value=muted?0:0.65;
  document.getElementById('ic-mute').textContent=muted?'✕':'♪';
  document.getElementById('ic-mute').classList.toggle('on',!muted);
});

document.getElementById('ic-reset').addEventListener('click',()=>initBalls());

// BOOT
resize();
loop();
</script>

</body>
</html>
