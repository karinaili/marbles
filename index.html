<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>marbles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');

*, *::before, *::after {
margin:0; padding:0; box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none; touch-action:manipulation;
}
html, body {
width:100%; height:100%; overflow:hidden;
background:#07070c;
}
canvas {
position:fixed; inset:0; display:block;
width:100%; height:100%;
}

/* ── PERM SCREEN ─────────────────────────────────── */
#perm {
position:fixed; inset:0; z-index:60;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:20px; padding:52px 48px;
background:#07070c;
transition: opacity .7s, visibility .7s;
}
#perm.gone { opacity:0; visibility:hidden; pointer-events:none; }

.logo {
font-family:‘Cormorant Garamond’,serif;
font-style:italic; font-weight:300;
font-size:58px; letter-spacing:.05em;
color:rgba(255,255,255,.9); line-height:1;
text-shadow:0 0 60px rgba(255,255,255,.12);
}
.sub {
font-family:‘DM Mono’,monospace; font-weight:300;
font-size:9.5px; letter-spacing:.24em; text-transform:uppercase;
color:rgba(255,255,255,.22); text-align:center; line-height:2.2;
}
#btn-go {
margin-top:6px; padding:13px 42px;
border:1px solid rgba(255,255,255,.2); background:transparent;
color:rgba(255,255,255,.55);
font-family:‘DM Mono’,monospace; font-weight:300;
font-size:9.5px; letter-spacing:.24em; text-transform:uppercase;
cursor:pointer; transition:all .18s;
}
#btn-go:active { background:rgba(255,255,255,.06); color:rgba(255,255,255,.8); }

/* ── BOTTOM STRIP ────────────────────────────────── */
#strip {
position:fixed; bottom:0; left:0; right:0;
padding:10px 18px calc(env(safe-area-inset-bottom,0px) + 16px);
background:linear-gradient(transparent, rgba(6,6,10,.92) 38%);
display:flex; flex-direction:column; gap:8px;
z-index:10; opacity:0;
transition:opacity .6s;
}
#strip.show { opacity:1; }

.chips {
display:flex; gap:5px; justify-content:center; flex-wrap:wrap;
}
.chip {
padding:4px 12px; border-radius:20px;
border:1px solid rgba(255,255,255,.1);
background:transparent; color:rgba(255,255,255,.28);
font-family:‘DM Mono’,monospace; font-weight:300;
font-size:8.5px; letter-spacing:.12em; cursor:pointer;
transition:all .15s; white-space:nowrap;
}
.chip.active {
border-color:rgba(255,255,255,.5);
color:rgba(255,255,255,.75);
background:rgba(255,255,255,.06);
}

.bottom-row {
display:flex; align-items:center; justify-content:center; gap:16px;
}
.ic {
width:30px; height:30px; border-radius:50%;
border:1px solid rgba(255,255,255,.12); background:transparent;
color:rgba(255,255,255,.3); font-size:11px;
display:flex; align-items:center; justify-content:center; cursor:pointer;
transition:all .15s;
}
.ic.on { border-color:rgba(255,255,255,.38); color:rgba(255,255,255,.65); }
.mode-name {
font-family:‘Cormorant Garamond’,serif; font-style:italic; font-weight:300;
font-size:17px; letter-spacing:.1em; color:rgba(255,255,255,.22);
min-width:70px; text-align:center;
}
</style>

</head>
<body>

<div id="perm">
  <div class="logo">marbles</div>
  <div class="sub">shake · tilt · roll<br>to play</div>
  <button id="btn-go">enable motion</button>
</div>

<canvas id="cv"></canvas>

<div id="strip">
  <div class="chips">
    <button class="chip active" data-mode="maracas">maracas</button>
    <button class="chip" data-mode="shaker">shaker</button>
    <button class="chip" data-mode="rain">rain stick</button>
    <button class="chip" data-mode="seeds">seeds</button>
    <button class="chip" data-mode="shells">shells</button>
  </div>
  <div class="bottom-row">
    <button class="ic" id="ic-mute">◼</button>
    <div class="mode-name" id="mode-label">maracas</div>
    <button class="ic on" id="ic-sound">♪</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let AC = null, master = null, muted = false;
let noiseBuf = null;

function initAC() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 1;
  master.connect(AC.destination);
}

function buildNoise() {
  if (noiseBuf || !AC) return;
  const sr = AC.sampleRate, N = Math.floor(sr * 0.4);
  noiseBuf = AC.createBuffer(1, N, sr);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < N; i++) d[i] = Math.random() * 2 - 1;
}

// Per-ball sound cooldown
const cd = new Map();
const CD_MS = 40; // min 40ms between sounds per ball id

function canPlay(id) {
  const t = performance.now();
  if ((t - (cd.get(id)||0)) < CD_MS) return false;
  cd.set(id, t); return true;
}

// MODE SOUND CONFIGS
const MODE_SOUND = {
  maracas(vel) {
    // Dry, bright, mid-high noise burst — classic maraca
    if (!noiseBuf) return;
    const now = AC.currentTime;
    const src = AC.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    src.loopStart = Math.random() * 0.35;
    src.loopEnd = src.loopStart + 0.05 + Math.random() * 0.04;

    const bp = AC.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 3500 + Math.random() * 2000;
    bp.Q.value = 1.2 + Math.random() * 0.8;

    const env = AC.createGain();
    const v = Math.min(0.65, 0.12 + vel * 0.48);
    env.gain.setValueAtTime(v, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.03 + vel * 0.04);

    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(now); src.stop(now + 0.09);
  },

  shaker(vel) {
    // Brighter, faster, more metallic
    if (!noiseBuf) return;
    const now = AC.currentTime;
    const src = AC.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    src.loopStart = Math.random() * 0.3;
    src.loopEnd = src.loopStart + 0.03;

    const hp = AC.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 4000 + Math.random() * 2000;

    const env = AC.createGain();
    const v = Math.min(0.55, 0.1 + vel * 0.42);
    env.gain.setValueAtTime(v, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.02 + vel * 0.025);

    src.connect(hp); hp.connect(env); env.connect(master);
    src.start(now); src.stop(now + 0.06);
  },

  rain(vel) {
    // Longer, softer, low-mid — rain stick
    if (!noiseBuf) return;
    const now = AC.currentTime;
    const src = AC.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    src.loopStart = Math.random() * 0.3;
    src.loopEnd = src.loopStart + 0.12;

    const bp = AC.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1200 + Math.random() * 800; bp.Q.value = 0.6;

    const env = AC.createGain();
    const v = Math.min(0.42, 0.07 + vel * 0.3);
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(v, now + 0.015);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.15 + vel * 0.12);

    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(now); src.stop(now + 0.32);
  },

  seeds(vel) {
    // Resonant mid — dry seeds
    if (!noiseBuf) return;
    const now = AC.currentTime;
    const src = AC.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    src.loopStart = Math.random() * 0.3;
    src.loopEnd = src.loopStart + 0.04;

    const bp = AC.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 2000 + Math.random() * 600; bp.Q.value = 3.5;

    const env = AC.createGain();
    const v = Math.min(0.6, 0.1 + vel * 0.46);
    env.gain.setValueAtTime(v, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.045 + vel * 0.055);

    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(now); src.stop(now + 0.12);
  },

  shells(vel) {
    // Light, hollow, high ping + noise
    if (!noiseBuf) return;
    const now = AC.currentTime;
    // Noise component
    const src = AC.createBufferSource();
    src.buffer = noiseBuf; src.loop = true;
    src.loopStart = Math.random() * 0.3;
    src.loopEnd = src.loopStart + 0.03;
    const bp = AC.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 5500 + Math.random() * 1500; bp.Q.value = 4;
    const env = AC.createGain();
    const v = Math.min(0.45, 0.08 + vel * 0.34);
    env.gain.setValueAtTime(v, now);
    env.gain.exponentialRampToValueAtTime(0.0001, now + 0.025 + vel * 0.03);
    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(now); src.stop(now + 0.08);
    // Sine ping
    const o = AC.createOscillator();
    const og = AC.createGain();
    o.type = 'sine'; o.frequency.value = 1600 + Math.random() * 1200;
    og.gain.setValueAtTime(v * 0.45, now);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.08 + vel * 0.06);
    o.connect(og); og.connect(master);
    o.start(now); o.stop(now + 0.18);
  },
};

let soundFn = MODE_SOUND.maracas;

function playSound(ballId, vel) {
  if (muted || !AC || !master) return;
  if (!canPlay(ballId)) return;
  if (vel < 0.05) return;
  soundFn(Math.min(1, vel));
}

// ═══════════════════════════════════════════════════════
//  PHYSICS — full screen rectangle container
// ═══════════════════════════════════════════════════════
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, dpr = 1;

// Gravity from sensor (in canvas units/frame²)
// Default: gravity down
let GX = 0, GY = 0.3;

const N = 110;         // number of balls
const RESTITUTION = 0.42;
const FRICTION    = 0.988;
const SUBSTEPS    = 4;

let balls = [];

function mkBall(id) {
  const r = 5 + Math.random() * 4;  // small: 5–9px
  return {
    id,
    x: r + Math.random() * (W - r * 2),
    y: r + Math.random() * (H * 0.5),
    vx: (Math.random() - .5) * 2,
    vy: (Math.random() - .5) * 2,
    r,
    // Visual: hue shifts per mode
    hue: 0, sat: '0%', lit: '80%',
    alpha: 0.75 + Math.random() * 0.25,
  };
}

const PALETTES = {
  // warm sandy tones
  maracas: () => ({ hue: 30  + Math.random()*25, sat:'38%', lit: (68+Math.random()*14)+'%' }),
  // cool blue-grey
  shaker:  () => ({ hue: 210 + Math.random()*30, sat:'28%', lit: (62+Math.random()*18)+'%' }),
  // deep teal-grey
  rain:    () => ({ hue: 185 + Math.random()*25, sat:'22%', lit: (52+Math.random()*18)+'%' }),
  // olive/moss
  seeds:   () => ({ hue: 80  + Math.random()*30, sat:'25%', lit: (55+Math.random()*15)+'%' }),
  // dusty rose / pale terracotta
  shells:  () => ({ hue: 10  + Math.random()*20, sat:'35%', lit: (70+Math.random()*14)+'%' }),
};
let paletteFn = PALETTES.maracas;

function colorBalls() {
  balls.forEach(b => {
    const c = paletteFn();
    b.hue = c.hue; b.sat = c.sat; b.lit = c.lit;
  });
}

function initBalls() {
  balls = [];
  for (let i = 0; i < N; i++) balls.push(mkBall(i));
  colorBalls();
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width  = W * dpr; cv.height = H * dpr;
  cv.style.width  = W + 'px'; cv.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initBalls();
}
window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });

// ── Physics step ──────────────────────────────────────
function step(dt) {
  const ss = dt / SUBSTEPS;

  for (let s = 0; s < SUBSTEPS; s++) {
    // Gravity + friction
    for (const b of balls) {
      b.vx = (b.vx + GX) * FRICTION;
      b.vy = (b.vy + GY) * FRICTION;
      b.x += b.vx;
      b.y += b.vy;
    }

    // Wall collisions
    for (const b of balls) {
      if (b.x - b.r < 0) {
        b.x = b.r;
        const imp = Math.abs(b.vx);
        b.vx = Math.abs(b.vx) * RESTITUTION;
        playSound(b.id, imp * 0.06);
      } else if (b.x + b.r > W) {
        b.x = W - b.r;
        const imp = Math.abs(b.vx);
        b.vx = -Math.abs(b.vx) * RESTITUTION;
        playSound(b.id, imp * 0.06);
      }
      if (b.y - b.r < 0) {
        b.y = b.r;
        const imp = Math.abs(b.vy);
        b.vy = Math.abs(b.vy) * RESTITUTION;
        playSound(b.id, imp * 0.06);
      } else if (b.y + b.r > H) {
        b.y = H - b.r;
        const imp = Math.abs(b.vy);
        b.vy = -Math.abs(b.vy) * RESTITUTION;
        playSound(b.id, imp * 0.06);
      }
    }

    // Ball-ball collisions (N=120 → ~7140 pairs per substep — measured fast ~0.3ms)
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d2 = dx*dx + dy*dy;
        const min = a.r + b.r;
        if (d2 >= min * min || d2 < 0.0001) continue;
        const dist = Math.sqrt(d2);
        const nx = dx/dist, ny = dy/dist;
        const overlap = (min - dist) * 0.5;
        a.x -= nx*overlap; a.y -= ny*overlap;
        b.x += nx*overlap; b.y += ny*overlap;
        const dvx = b.vx-a.vx, dvy = b.vy-a.vy;
        const dot = dvx*nx + dvy*ny;
        if (dot < 0) {
          const imp = dot * (1+RESTITUTION) * 0.5;
          a.vx += imp*nx; a.vy += imp*ny;
          b.vx -= imp*nx; b.vy -= imp*ny;
          const hitVel = Math.abs(dot) * 0.055;
          if (hitVel > 0.04) playSound(i*1000+j, hitVel * 0.7);
        }
      }
    }
  }
}

// ── Rendering ─────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#07070c';
  ctx.fillRect(0, 0, W, H);

  for (const b of balls) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${b.hue},${b.sat},${b.lit},${b.alpha})`;
    ctx.fill();
  }
}

let lastT = null;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = lastT ? Math.min(ts - lastT, 33) : 16;
  lastT = ts;
  step(dt * 0.6); // scale so physics feels right regardless of fps
  draw();
}

// ═══════════════════════════════════════════════════════
//  MOTION
// ═══════════════════════════════════════════════════════
function onMotion(e) {
  const a = e.accelerationIncludingGravity || {};
  // Convert m/s² to per-frame units (assuming 60fps, ~0.016s/frame)
  // Multiply by small factor so tilt feels natural
  GX =  (a.x || 0) * 0.055;
  GY = -(a.y || 0) * 0.055;
  // Cap so balls don't go crazy
  GX = Math.max(-0.7, Math.min(0.7, GX));
  GY = Math.max(-0.7, Math.min(0.7, GY));
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
document.getElementById('btn-go').addEventListener('click', async () => {
  initAC();
  buildNoise();
  try {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const res = await DeviceMotionEvent.requestPermission();
      if (res !== 'granted') throw new Error('denied');
    }
    window.addEventListener('devicemotion', onMotion, { passive: true });
  } catch(err) {
    // On desktop / no sensor — still allow for visual test
    console.warn('Motion:', err.message);
  }
  document.getElementById('perm').classList.add('gone');
  document.getElementById('strip').classList.add('show');
});

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const m = btn.dataset.mode;
    soundFn = MODE_SOUND[m] || MODE_SOUND.maracas;
    paletteFn = PALETTES[m] || PALETTES.maracas;
    document.getElementById('mode-label').textContent = btn.textContent;
    colorBalls();
  });
});

document.getElementById('ic-mute').addEventListener('click', () => {
  muted = !muted;
  if (master) master.gain.value = muted ? 0 : 1;
  document.getElementById('ic-mute').classList.toggle('on', !muted);
  document.getElementById('ic-sound').classList.toggle('on', !muted);
});

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
resize();
requestAnimationFrame(loop);
</script>

</body>
</html>
