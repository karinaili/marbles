<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>marbles</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap');

*, *::before, *::after {
margin:0; padding:0; box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
user-select:none; touch-action:manipulation;
}
html, body { width:100%; height:100%; overflow:hidden; background:#07070c; }
canvas { position:fixed; inset:0; width:100%; height:100%; display:block; }

/* ── SPLASH — full screen tap target ──────────────── */
#splash {
position:fixed; inset:0; z-index:60;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:18px; padding:52px 48px;
background:#07070c;
transition: opacity .7s, visibility .7s;
cursor:pointer;
}
#splash.gone { opacity:0; visibility:hidden; pointer-events:none; }
.logo {
font-family:‘Cormorant Garamond’,serif; font-style:italic; font-weight:300;
font-size:60px; letter-spacing:.05em;
color:rgba(255,255,255,.88);
text-shadow:0 0 60px rgba(255,255,255,.1);
}
.sub {
font-family:‘DM Mono’,monospace; font-weight:300;
font-size:9px; letter-spacing:.24em; text-transform:uppercase;
color:rgba(255,255,255,.2); text-align:center; line-height:2.3;
}
/* Big pulsing tap hint */
.tap-hint {
margin-top:16px;
width:72px; height:72px; border-radius:50%;
border:1px solid rgba(255,255,255,.18);
display:flex; align-items:center; justify-content:center;
font-family:‘DM Mono’,monospace; font-weight:300;
font-size:8.5px; letter-spacing:.18em; text-transform:uppercase;
color:rgba(255,255,255,.35);
animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
0%,100% { transform:scale(1);   border-color:rgba(255,255,255,.18); }
50%      { transform:scale(1.06);border-color:rgba(255,255,255,.38); }
}

/* ── STRIP ─────────────────────────────────────────── */
#strip {
position:fixed; bottom:0; left:0; right:0;
padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 14px);
background:linear-gradient(transparent, rgba(7,7,12,.94) 36%);
display:flex; flex-direction:column; gap:7px;
z-index:10; opacity:0; transition:opacity .6s;
}
#strip.show { opacity:1; }
.chips { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; }
.chip {
padding:4px 12px; border-radius:20px;
border:1px solid rgba(255,255,255,.1); background:transparent;
color:rgba(255,255,255,.28);
font-family:‘DM Mono’,monospace; font-weight:300;
font-size:8.5px; letter-spacing:.12em; cursor:pointer;
transition:all .15s; white-space:nowrap;
}
.chip.active {
border-color:rgba(255,255,255,.5); color:rgba(255,255,255,.78);
background:rgba(255,255,255,.06);
}
.bottom-row {
display:flex; align-items:center; justify-content:center; gap:14px;
}
.ic {
width:30px; height:30px; border-radius:50%;
border:1px solid rgba(255,255,255,.12); background:transparent;
color:rgba(255,255,255,.3); font-size:11px;
display:flex; align-items:center; justify-content:center;
cursor:pointer; transition:all .15s;
}
.ic.on { border-color:rgba(255,255,255,.4); color:rgba(255,255,255,.7); }
.mode-name {
font-family:‘Cormorant Garamond’,serif; font-style:italic; font-weight:300;
font-size:17px; letter-spacing:.1em; color:rgba(255,255,255,.22);
min-width:70px; text-align:center;
}
</style>

</head>
<body>

<!-- Full screen tap = init audio + motion -->

<div id="splash">
  <div class="logo">marbles</div>
  <div class="sub">shake · tilt · roll<br>to play</div>
  <div class="tap-hint">tap</div>
</div>

<canvas id="cv"></canvas>

<div id="strip">
  <div class="chips">
    <button class="chip active" data-mode="maracas">maracas</button>
    <button class="chip" data-mode="shaker">shaker</button>
    <button class="chip" data-mode="rain">rain stick</button>
    <button class="chip" data-mode="seeds">seeds</button>
    <button class="chip" data-mode="shells">shells</button>
  </div>
  <div class="bottom-row">
    <button class="ic on" id="ic-mute">♪</button>
    <div class="mode-name" id="mode-label">maracas</div>
    <button class="ic" id="ic-reset">↺</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  1. AUDIO — unlock speaker on iOS
// ═══════════════════════════════════════════════════════
let AC = null, master = null, muted = false;

// Multiple short noise buffers for variety
const NOISE_BUFS = [];
const N_NOISE = 8;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain();
  master.gain.value = 1.0;
  master.connect(AC.destination);

  // ── iOS SPEAKER UNLOCK ──────────────────────────────
  // Play a silent buffer immediately on user gesture.
  // This forces iOS to route to the main speaker instead of earpiece/headphones.
  const silentBuf = AC.createBuffer(1, 1, AC.sampleRate);
  const silentSrc = AC.createBufferSource();
  silentSrc.buffer = silentBuf;
  silentSrc.connect(AC.destination);
  silentSrc.start(0);

  // Resume if suspended (needed on some iOS versions)
  if (AC.state === 'suspended') AC.resume();

  buildNoise();
}

function buildNoise() {
  if (NOISE_BUFS.length || !AC) return;
  const sr = AC.sampleRate;
  // Build several short buffers with different character
  for (let b = 0; b < N_NOISE; b++) {
    const len = Math.floor(sr * (0.08 + b * 0.015));
    const buf = AC.createBuffer(1, len, sr);
    const d = buf.getChannelData(0);
    // Mix of white noise with slight pink tint
    let p = 0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      p = p * 0.97 + w * 0.03; // gentle low-pass for pink-ish
      d[i] = w * 0.7 + p * 0.3;
    }
    NOISE_BUFS.push(buf);
  }
}

// ── Per-collision cooldown ──────────────────────────
const hitCd = new Map();

function canHit(id, minMs) {
  const now = performance.now();
  const last = hitCd.get(id) || 0;
  if (now - last < minMs) return false;
  hitCd.set(id, now);
  return true;
}

// ── MARACAS SOUND: granular seed cluster ────────────
// Fires 2–5 tiny overlapping grains → sounds like seeds
function playMaracas(vel) {
  if (!AC || !master || !NOISE_BUFS.length) return;
  const now = AC.currentTime;
  const grains = 2 + Math.floor(vel * 4); // 2–6 grains

  for (let g = 0; g < grains; g++) {
    const delay = g * (0.004 + Math.random() * 0.006); // stagger 0–30ms
    const buf = NOISE_BUFS[Math.floor(Math.random() * N_NOISE)];

    const src = AC.createBufferSource();
    src.buffer = buf;
    // Random pitch variation: seeds tumbling at different speeds
    src.playbackRate.value = 0.8 + Math.random() * 0.7;

    // Bandpass: seeds are mid-high, dry
    const bp = AC.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2800 + Math.random() * 2400;
    bp.Q.value = 0.8 + Math.random() * 1.4;

    // Short attack, fast decay
    const env = AC.createGain();
    const t0 = now + delay;
    const vol = Math.min(0.7, (0.08 + vel * 0.55) / grains * 2.2);
    const decay = 0.018 + vel * 0.028 + Math.random() * 0.012;
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(vol, t0 + 0.003);
    env.gain.exponentialRampToValueAtTime(0.0001, t0 + decay);

    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(t0);
    src.stop(t0 + decay + 0.01);
  }
}

// ── OTHER MODE SOUNDS ───────────────────────────────
function playShaker(vel) {
  if (!AC || !NOISE_BUFS.length) return;
  const now = AC.currentTime;
  const src = AC.createBufferSource();
  src.buffer = NOISE_BUFS[Math.floor(Math.random() * N_NOISE)];
  src.playbackRate.value = 1.2 + Math.random() * 0.6;
  const hp = AC.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 5000 + Math.random() * 2000;
  const env = AC.createGain();
  const v = Math.min(0.55, 0.08 + vel * 0.44);
  env.gain.setValueAtTime(v, now);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 0.015 + vel * 0.018);
  src.connect(hp); hp.connect(env); env.connect(master);
  src.start(now); src.stop(now + 0.06);
}

function playRain(vel) {
  if (!AC || !NOISE_BUFS.length) return;
  const now = AC.currentTime;
  const src = AC.createBufferSource();
  src.buffer = NOISE_BUFS[Math.floor(Math.random() * N_NOISE)];
  src.playbackRate.value = 0.5 + Math.random() * 0.4;
  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 900 + Math.random() * 600; bp.Q.value = 0.5;
  const env = AC.createGain();
  const v = Math.min(0.4, 0.06 + vel * 0.28);
  env.gain.setValueAtTime(0, now);
  env.gain.linearRampToValueAtTime(v, now + 0.01);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 0.12 + vel * 0.1);
  src.connect(bp); bp.connect(env); env.connect(master);
  src.start(now); src.stop(now + 0.28);
}

function playSeeds(vel) {
  if (!AC || !NOISE_BUFS.length) return;
  const now = AC.currentTime;
  const grains = 1 + Math.floor(vel * 3);
  for (let g = 0; g < grains; g++) {
    const d = g * 0.005;
    const src = AC.createBufferSource();
    src.buffer = NOISE_BUFS[Math.floor(Math.random() * N_NOISE)];
    src.playbackRate.value = 0.9 + Math.random() * 0.5;
    const bp = AC.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1800 + Math.random() * 1000; bp.Q.value = 2.5;
    const env = AC.createGain();
    const v = Math.min(0.6, (0.1 + vel * 0.45) / grains * 1.8);
    env.gain.setValueAtTime(v, now+d);
    env.gain.exponentialRampToValueAtTime(0.0001, now + d + 0.04 + vel*0.04);
    src.connect(bp); bp.connect(env); env.connect(master);
    src.start(now+d); src.stop(now+d+0.1);
  }
}

function playShells(vel) {
  if (!AC || !NOISE_BUFS.length) return;
  const now = AC.currentTime;
  const src = AC.createBufferSource();
  src.buffer = NOISE_BUFS[Math.floor(Math.random() * N_NOISE)];
  const bp = AC.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 5500 + Math.random() * 2000; bp.Q.value = 4;
  const env = AC.createGain();
  const v = Math.min(0.45, 0.07 + vel * 0.35);
  env.gain.setValueAtTime(v, now);
  env.gain.exponentialRampToValueAtTime(0.0001, now + 0.022 + vel * 0.025);
  src.connect(bp); bp.connect(env); env.connect(master);
  src.start(now); src.stop(now + 0.07);
  // tiny ping
  const o = AC.createOscillator(), og = AC.createGain();
  o.frequency.value = 1400 + Math.random() * 1000;
  og.gain.setValueAtTime(v * 0.3, now);
  og.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);
  o.connect(og); og.connect(master); o.start(now); o.stop(now+0.1);
}

const SOUNDS = { maracas: playMaracas, shaker: playShaker,
                 rain: playRain, seeds: playSeeds, shells: playShells };
let soundFn = playMaracas;

function playWall(ballId, vel) {
  if (muted || !AC) return;
  if (!canHit(ballId, 38)) return;
  if (vel < 0.04) return;
  soundFn(Math.min(1, vel));
}

function playBallBall(id, vel) {
  if (muted || !AC) return;
  if (!canHit('bb_' + id, 28)) return;
  if (vel < 0.05) return;
  soundFn(Math.min(0.7, vel * 0.65));
}

// ═══════════════════════════════════════════════════════
//  2. PHYSICS — full screen, 180 balls, fast
// ═══════════════════════════════════════════════════════
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, dpr = 1;

let GX = 0, GY = 0.35; // per-frame gravity from sensor

const BALL_N     = 180;
const RESTITUTION = 0.48;
const FRICTION    = 0.991;
const SUBSTEPS    = 3;
const BALL_R_MIN  = 3.5;
const BALL_R_MAX  = 7.5;

let balls = [];

const PALETTES = {
  maracas: () => ({ h: 28  + Math.random()*22, s: 35, l: 65 + Math.random()*16 }),
  shaker:  () => ({ h: 210 + Math.random()*28, s: 25, l: 60 + Math.random()*18 }),
  rain:    () => ({ h: 188 + Math.random()*24, s: 20, l: 50 + Math.random()*18 }),
  seeds:   () => ({ h: 82  + Math.random()*28, s: 24, l: 53 + Math.random()*16 }),
  shells:  () => ({ h: 12  + Math.random()*18, s: 32, l: 68 + Math.random()*14 }),
};
let palFn = PALETTES.maracas;

function mkBall(i) {
  const r = BALL_R_MIN + Math.random() * (BALL_R_MAX - BALL_R_MIN);
  const c = palFn();
  return {
    id: i,
    x: r + Math.random() * (W - r * 2),
    y: r + Math.random() * (H * 0.6),
    vx: (Math.random() - .5) * 3,
    vy: (Math.random() - .5) * 3,
    r,
    fill: `hsl(${c.h},${c.s}%,${c.l}%)`,
    a: 0.72 + Math.random() * 0.28,
  };
}

function initBalls() {
  balls = [];
  for (let i = 0; i < BALL_N; i++) balls.push(mkBall(i));
}

function recolor() {
  balls.forEach(b => {
    const c = palFn();
    b.fill = `hsl(${c.h},${c.s}%,${c.l}%)`;
  });
}

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  initBalls();
}
window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });

function physicsStep() {
  for (let s = 0; s < SUBSTEPS; s++) {
    // Gravity + damping
    for (const b of balls) {
      b.vx = (b.vx + GX) * FRICTION;
      b.vy = (b.vy + GY) * FRICTION;
      b.x += b.vx;
      b.y += b.vy;
    }

    // Wall collisions
    for (const b of balls) {
      if (b.x - b.r < 0) {
        b.x = b.r;
        const sp = Math.abs(b.vx);
        b.vx = sp * RESTITUTION;
        playWall(b.id * 4,     sp * 0.055);
      } else if (b.x + b.r > W) {
        b.x = W - b.r;
        const sp = Math.abs(b.vx);
        b.vx = -sp * RESTITUTION;
        playWall(b.id * 4 + 1, sp * 0.055);
      }
      if (b.y - b.r < 0) {
        b.y = b.r;
        const sp = Math.abs(b.vy);
        b.vy = sp * RESTITUTION;
        playWall(b.id * 4 + 2, sp * 0.055);
      } else if (b.y + b.r > H) {
        b.y = H - b.r;
        const sp = Math.abs(b.vy);
        b.vy = -sp * RESTITUTION;
        playWall(b.id * 4 + 3, sp * 0.055);
      }
    }

    // Ball-ball collisions
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d2 = dx*dx + dy*dy;
        const minD = a.r + b.r;
        if (d2 >= minD*minD || d2 < 0.001) continue;
        const dist = Math.sqrt(d2);
        const nx = dx/dist, ny = dy/dist;
        const ov = (minD - dist) * 0.5;
        a.x -= nx*ov; a.y -= ny*ov;
        b.x += nx*ov; b.y += ny*ov;
        const dvx = b.vx-a.vx, dvy = b.vy-a.vy;
        const dot = dvx*nx + dvy*ny;
        if (dot < 0) {
          const imp = dot * (1 + RESTITUTION) * 0.5;
          a.vx += imp*nx; a.vy += imp*ny;
          b.vx -= imp*nx; b.vy -= imp*ny;
          playBallBall(i * BALL_N + j, Math.abs(dot) * 0.05);
        }
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#07070c';
  ctx.fillRect(0, 0, W, H);
  for (const b of balls) {
    ctx.globalAlpha = b.a;
    ctx.fillStyle = b.fill;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

let lastT = null;
function loop(ts) {
  requestAnimationFrame(loop);
  lastT = ts;
  physicsStep();
  draw();
}

// ═══════════════════════════════════════════════════════
//  3. MOTION
// ═══════════════════════════════════════════════════════
function onMotion(e) {
  const a = e.accelerationIncludingGravity || {};
  GX = Math.max(-0.8, Math.min(0.8,  (a.x || 0) * 0.058));
  GY = Math.max(-0.8, Math.min(0.8, -(a.y || 0) * 0.058));
}

// ═══════════════════════════════════════════════════════
//  4. UI
// ═══════════════════════════════════════════════════════
document.getElementById('splash').addEventListener('click', async () => {
  // Init audio on user gesture — this is what unlocks the speaker on iOS
  initAudio();

  try {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const res = await DeviceMotionEvent.requestPermission();
      if (res !== 'granted') throw new Error('denied');
    }
    window.addEventListener('devicemotion', onMotion, { passive: true });
  } catch(e) {
    console.warn('Motion:', e.message);
    // Still works without motion — can test by tilting browser on desktop
  }

  document.getElementById('splash').classList.add('gone');
  document.getElementById('strip').classList.add('show');
});

document.querySelectorAll('.chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const m = btn.dataset.mode;
    soundFn = SOUNDS[m] || playMaracas;
    palFn   = PALETTES[m] || PALETTES.maracas;
    document.getElementById('mode-label').textContent = btn.textContent;
    recolor();
  });
});

document.getElementById('ic-mute').addEventListener('click', () => {
  muted = !muted;
  if (master) master.gain.value = muted ? 0 : 1;
  document.getElementById('ic-mute').textContent = muted ? '✕' : '♪';
  document.getElementById('ic-mute').classList.toggle('on', !muted);
});

document.getElementById('ic-reset').addEventListener('click', () => {
  initBalls();
});

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
resize();
requestAnimationFrame(loop);
</script>

</body>
</html>
